name: Build and Push Docker Image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Measure page transfer size
        id: carbon
        run: |
          BYTES=$(node scripts/carbon-badge.mjs measure)
          echo "bytes=$BYTES" >> "$GITHUB_OUTPUT"
          echo "Measured transfer size: $BYTES bytes"

      - name: Fetch carbon data and patch HTML
        run: |
          RESPONSE=$(curl -sf "https://api.websitecarbon.com/data?bytes=${{ steps.carbon.outputs.bytes }}&green=1")
          CO2=$(echo "$RESPONSE" | jq -r '.gco2e | . * 100 | round / 100')
          PERCENT=$(echo "$RESPONSE" | jq -r '.cleanerThan | . * 100 | round')
          echo "CO2: ${CO2}g | Cleaner than: ${PERCENT}%"
          node scripts/carbon-badge.mjs patch "$CO2" "$PERCENT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
